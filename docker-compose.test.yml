version: '3.8'

services:
  postgres-test:
    image: postgres:15-alpine
    container_name: templify-test-db
    environment:
      POSTGRES_DB: templify_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    ports:
      - '5433:5432'
    volumes:
      - test-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [CMD-SHELL, pg_isready -U test -d templify_test]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - test-network

networks:
  test-network:
    driver: bridge

volumes:
  test-db-data:
    driver: local
